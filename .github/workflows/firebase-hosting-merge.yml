name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: echo "VITE_API_KEY_FIREBASE=${{ secrets.VITE_API_KEY_FIREBASE }}" > web/.env
      - run: yarn install --frozen-lockfile && yarn --cwd web build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENDFLOW_TEST_533E0 }}
          channelId: live
          projectId: sendflow-test-533e0
